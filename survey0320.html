<body>
<div class="container" id="app"></div>
<script>
/* ════════════════════════════════════
   ★ 研究者設定區
   將 Google Apps Script 部署網址貼入下方引號內，然後上傳 GitHub Pages
   ════════════════════════════════════ */
const CONFIG = {
  GAS_URL: 'https://script.google.com/macros/s/AKfycbwQaNdDM3o-bO-kTCe_kfMYVtArMzcohix5biBOxA4Rl9Iug_GBWmSxR8bDqeabEhpajw/exec'   // ← 貼入您的 GAS 部署網址，例如：'https://script.google.com/macros/s/AKfycb.../exec'
};

/* ════════════════════════════════════
   MATH — jStat F & t CDF
   ════════════════════════════════════ */
function lgamma(z){const c=[76.18009172947146,-86.50532032941677,24.01409824083091,-1.231739572450155,0.1208650973866179e-2,-0.5395239384953e-5];let y=z,x=z,tmp=x+5.5;tmp-=(x+0.5)*Math.log(tmp);let ser=1.000000000190015;for(let j=0;j<6;j++)ser+=c[j]/++y;return-tmp+Math.log(2.5066282746310005*ser/x);}
function betacf(a,b,x){const MAXIT=200,EPS=3e-7,FPMIN=1e-30;let qab=a+b,qap=a+1,qam=a-1,c=1,d=1-qab*x/qap;if(Math.abs(d)<FPMIN)d=FPMIN;d=1/d;let h=d;for(let m=1;m<=MAXIT;m++){let m2=2*m,aa=m*(b-m)*x/((qam+m2)*(a+m2));d=1+aa*d;if(Math.abs(d)<FPMIN)d=FPMIN;c=1+aa/c;if(Math.abs(c)<FPMIN)c=FPMIN;d=1/d;h*=d*c;aa=-(a+m)*(qab+m)*x/((a+m2)*(qap+m2));d=1+aa*d;if(Math.abs(d)<FPMIN)d=FPMIN;c=1+aa/c;if(Math.abs(c)<FPMIN)c=FPMIN;d=1/d;let del=d*c;h*=del;if(Math.abs(del-1)<EPS)break;}return h;}
function ibeta(a,b,x){if(x<=0)return 0;if(x>=1)return 1;const lbt=Math.exp(Math.log(x)*a+Math.log(1-x)*b-lgamma(a)-lgamma(b)+lgamma(a+b));return x<(a+1)/(a+b+2)?lbt*betacf(a,b,x)/a:1-lbt*betacf(b,a,1-x)/b;}
function pF(F,d1,d2){if(F<=0)return 1;try{return 1-ibeta(d1/2,d2/2,d1*F/(d1*F+d2));}catch(e){return NaN;}}
function pT2(t,df){const x=df/(df+t*t);try{return ibeta(df/2,0.5,x);}catch(e){return NaN;}}

/* ════════════════════════════════════
   OLS REGRESSION
   ════════════════════════════════════ */
function solveLinear(A,b){const n=b.length,aug=A.map((r,i)=>[...r,b[i]]);for(let c=0;c<n;c++){let mx=c;for(let r=c+1;r<n;r++)if(Math.abs(aug[r][c])>Math.abs(aug[mx][c]))mx=r;[aug[c],aug[mx]]=[aug[mx],aug[c]];if(Math.abs(aug[c][c])<1e-12)continue;for(let r=0;r<n;r++){if(r===c)continue;const f=aug[r][c]/aug[c][c];for(let j=c;j<=n;j++)aug[r][j]-=f*aug[c][j];}}return aug.map((r,i)=>r[n]/r[i]);}
function invertMat(A){const n=A.length,aug=A.map((r,i)=>{const id=Array(n).fill(0);id[i]=1;return[...r,...id];});for(let c=0;c<n;c++){let mx=c;for(let r=c+1;r<n;r++)if(Math.abs(aug[r][c])>Math.abs(aug[mx][c]))mx=r;[aug[c],aug[mx]]=[aug[mx],aug[c]];const piv=aug[c][c];if(Math.abs(piv)<1e-12)return null;for(let j=0;j<2*n;j++)aug[c][j]/=piv;for(let r=0;r<n;r++){if(r===c)continue;const f=aug[r][c];for(let j=0;j<2*n;j++)aug[r][j]-=f*aug[c][j];}}return aug.map(r=>r.slice(n));}
function ols(Xmat,Y){const n=Y.length,p=Xmat[0].length;const XtX=Array(p).fill(0).map(()=>Array(p).fill(0));const XtY=Array(p).fill(0);for(let i=0;i<n;i++)for(let j=0;j<p;j++){XtY[j]+=Xmat[i][j]*Y[i];for(let k=0;k<p;k++)XtX[j][k]+=Xmat[i][j]*Xmat[i][k];}const beta=solveLinear(XtX.map(r=>[...r]),XtY.slice());let SSE=0;for(let i=0;i<n;i++){let yh=0;for(let j=0;j<p;j++)yh+=Xmat[i][j]*beta[j];SSE+=(Y[i]-yh)**2;}const MSE=SSE/(n-p);const inv=invertMat(XtX);const se=beta.map((_,j)=>inv?Math.sqrt(Math.max(0,MSE*inv[j][j])):NaN);const tv=beta.map((b,j)=>b/se[j]);const pv=tv.map(t=>pT2(Math.abs(t),n-p));return{beta,se,t:tv,p:pv};}

/* ════════════════════════════════════
   HAYES PROCESS Model 4 + Bootstrap
   ════════════════════════════════════ */
function runMediation(x,m,y,B=5000){
  const n=x.length;if(n<10)return null;
  const ra=ols(x.map(v=>[1,v]),m);
  const a=ra.beta[1],a_se=ra.se[1],a_t=ra.t[1],a_p=ra.p[1];
  const rbc=ols(x.map((v,i)=>[1,v,m[i]]),y);
  const cp=rbc.beta[1],cp_se=rbc.se[1],cp_t=rbc.t[1],cp_p=rbc.p[1];
  const b=rbc.beta[2],b_se=rbc.se[2],b_t=rbc.t[2],b_p=rbc.p[2];
  const rc=ols(x.map(v=>[1,v]),y);
  const c=rc.beta[1],c_se=rc.se[1],c_t=rc.t[1],c_p=rc.p[1];
  const ab_boot=[];
  for(let iter=0;iter<B;iter++){
    const idx=Array.from({length:n},()=>Math.floor(Math.random()*n));
    const bx=idx.map(i=>x[i]),bm=idx.map(i=>m[i]),by=idx.map(i=>y[i]);
    const ra_b=ols(bx.map(v=>[1,v]),bm);
    const rbc_b=ols(bx.map((v,i)=>[1,v,bm[i]]),by);
    ab_boot.push(ra_b.beta[1]*rbc_b.beta[2]);
  }
  ab_boot.sort((a,b)=>a-b);
  const lo=ab_boot[Math.floor(.025*B)],hi=ab_boot[Math.ceil(.975*B)-1];
  return{a,a_se,a_t,a_p,b,b_se,b_t,b_p,cp,cp_se,cp_t,cp_p,c,c_se,c_t,c_p,indirect:a*b,lo,hi,n,B};
}

/* ════════════════════════════════════
   ONE-WAY ANOVA
   ════════════════════════════════════ */
function anova(groups){const all=groups.flat(),N=all.length,k=groups.length;const gm=all.reduce((s,x)=>s+x,0)/N;let SSB=0;groups.forEach(g=>{const gmu=g.reduce((s,x)=>s+x,0)/g.length;SSB+=g.length*(gmu-gm)**2;});let SSW=0;groups.forEach(g=>{const gmu=g.reduce((s,x)=>s+x,0)/g.length;g.forEach(x=>{SSW+=(x-gmu)**2;});});const dfB=k-1,dfW=N-k,MSB=SSB/dfB,MSW=SSW/dfW,F=MSW>0?MSB/MSW:0;return{SSB,SSW,dfB,dfW,MSB,MSW,F,p:pF(F,dfB,dfW)};}
function mu(arr){return arr.length?arr.reduce((s,x)=>s+x,0)/arr.length:NaN;}
function num(v){const n=+v;return(!isNaN(n)&&n>0)?n:NaN;}
function sigStar(p){return p<.001?'***':p<.01?'**':p<.05?'*':p<.1?'†':'ns';}
function fp(p){return isNaN(p)?'—':p<.001?'&lt; .001':p.toFixed(3);}

/* ════════════════════════════════════
   STORAGE — GAS (primary) + localStorage (backup)
   ════════════════════════════════════ */
const LS_KEY='survey_nccu_v4';

async function storageSave(resp){
  // 永遠先存本機備份
  try{const a=JSON.parse(localStorage.getItem(LS_KEY)||'[]');a.push(resp);localStorage.setItem(LS_KEY,JSON.stringify(a));}catch(e){}
  // 若已設定 GAS，同步送至 Google Sheets
  if(CONFIG.GAS_URL){
    try{
      await fetch(CONFIG.GAS_URL,{
        method:'POST',
        mode:'no-cors',
        headers:{'Content-Type':'text/plain'},
        body:JSON.stringify(resp)
      });
    }catch(e){console.warn('GAS POST failed — data saved to localStorage as backup:', e);}
  }
}

async function storageLoadAll(){
  if(CONFIG.GAS_URL){
    try{
      const r=await fetch(CONFIG.GAS_URL+'?action=getData',{cache:'no-store'});
      if(!r.ok)throw new Error('HTTP '+r.status);
      const data=await r.json();
      if(data&&Array.isArray(data.rows))return data.rows;
    }catch(e){console.warn('GAS GET failed — loading localStorage instead:', e);}
  }
  try{return JSON.parse(localStorage.getItem(LS_KEY)||'[]');}catch(e){return[];}
}

async function storageClear(){
  if(!confirm('確定要清除本機快取資料？\n（Google Sheets 上的資料不受影響，需手動至 Sheets 刪除）'))return;
  try{localStorage.removeItem(LS_KEY);}catch(e){}
  renderAdmin();
}

function pgScreen(){return`

    <div class="stat-card"><div class="num">${rs.length}</div><div class="lbl">總填答人數</div></div>
    <div class="stat-card"><div class="num">${s1r.length}</div><div class="lbl">情境一有效</div></div>
    <div class="stat-card"><div class="num">${s2r.length}</div><div class="lbl">情境二有效</div></div>
    <div class="stat-card"><div class="num">${rs.filter(r=>r.S1_ManipCorrect==1).length}</div><div class="lbl">S1 操弄通過</div></div>
    <div class="stat-card"><div class="num">${rs.filter(r=>r.S2_ManipCorrect==1).length}</div><div class="lbl">S2 操弄通過</div></div>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <button class="btn btn-success" onclick="exportCSV()">⬇ 匯出 CSV（SPSS）</button>
    <button class="btn btn-danger" onclick="storageClear()">🗑 清除本機快取</button>
    <button class="btn btn-secondary" onclick="renderAdmin()">🔄 重新整理</button>
    <button class="btn btn-secondary" onclick="reset();render()">← 返回問卷首頁</button>
  </div>
</div>
<div class="card">
  <div class="tab-nav">
    <button class="tab-btn ${aTab==='overview'?'active':''}" onclick="aTab='overview';document.getElementById('tb').innerHTML=tabC(${JSON.stringify(rs)})">📈 資料總覽</button>
    <button class="tab-btn ${aTab==='anova1'?'active':''}" onclick="aTab='anova1';document.getElementById('tb').innerHTML=tabC(${JSON.stringify(rs)})">🧪 情境一 ANOVA (A/B/C)</button>
    <button class="tab-btn ${aTab==='process2'?'active':''}" onclick="aTab='process2';document.getElementById('tb').innerHTML=tabC(${JSON.stringify(rs)})">🔬 情境二 PROCESS Model 4</button>
    <button class="tab-btn ${aTab==='raw'?'active':''}" onclick="aTab='raw';document.getElementById('tb').innerHTML=tabC(${JSON.stringify(rs)})">🗃 原始資料</button>
  </div>
  <div id="tb">${tabC(rs)}</div>
</div>`;}

function tabC(rs){if(aTab==='overview')return tabOverview(rs);if(aTab==='anova1')return tabAnova1(rs);if(aTab==='process2')return tabProcess2(rs);if(aTab==='raw')return tabRaw(rs);return '';}

/* ── OVERVIEW ── */
function tabOverview(rs){
  if(!rs.length)return'<div class="alert alert-warn">尚無資料。</div>';
  const s1r=rs.filter(r=>r.S1_Condition),s2r=rs.filter(r=>r.S2_Condition);
  const ct=(arr,k)=>arr.reduce((m,r)=>{m[r[k]]=(m[r[k]]||0)+1;return m;},{});
  const pct=(n,t)=>t>0?(n/t*100).toFixed(1)+'%':'—';
  const g=ct(rs,'Demo_Gender'),e=ct(rs,'Demo_Education'),s1c=ct(s1r,'S1_Condition'),s2c=ct(s2r,'S2_Condition');
  const gL={1:'男',2:'女',3:'其他'},eL={1:'高中職以下',2:'專科',3:'大學',4:'碩士以上'};
  const row=(lbl,n,t)=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #e8edf2;font-size:12.5px;"><span>${lbl}</span><span><strong>${n}</strong>（${pct(n,t)}）</span></div>`;
  return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px;">
  <div><p style="font-weight:700;font-size:13px;margin-bottom:8px;">性別（N=${rs.length}）</p>${[1,2,3].map(k=>row(gL[k],g[k]||0,rs.length)).join('')}</div>
  <div><p style="font-weight:700;font-size:13px;margin-bottom:8px;">教育程度</p>${[1,2,3,4].map(k=>row(eL[k],e[k]||0,rs.length)).join('')}</div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;">
  <div><p style="font-weight:700;font-size:13px;margin-bottom:8px;">情境一組別（N=${s1r.length}）</p>${['A','B','C'].map(c=>row('組別 '+c,s1c[c]||0,s1r.length)).join('')}</div>
  <div><p style="font-weight:700;font-size:13px;margin-bottom:8px;">情境二組別（N=${s2r.length}）</p>${['A','B'].map(c=>row('組別 '+c,s2c[c]||0,s2r.length)).join('')}</div>
</div>`;}

/* ── ANOVA TAB ── */
function tabAnova1(rs){
  const s1r=rs.filter(r=>r.S1_Condition);
  if(s1r.length<6)return`<div class="alert alert-warn">情境一資料不足（目前 ${s1r.length} 筆，建議每組至少 10 人）。</div>`;
  const gA=s1r.filter(r=>r.S1_Condition==='A'),gB=s1r.filter(r=>r.S1_Condition==='B'),gC=s1r.filter(r=>r.S1_Condition==='C');
  const vars=[
    {k:'S1_Q1',l:'Q1 採納同事建議弄碎手機申請理賠'},
    {k:'S1_Q2',l:'Q2 技巧性讓手機符合理賠標準'},
    {k:'S1_Q3',l:'Q3 故意擴大手機損壞程度'},
    {k:'S1_Q4',l:'Q4 只是拿回應得權益（道德脫離）'},
    {k:'S1_Q5',l:'Q5 保險規定不通人情（外部歸因）'},
    {k:'S1_Q6_R',l:'Q6 認為是嚴重詐欺行為（反向題）'},
    {k:'S1_Q7_R',l:'Q7 強烈不安與罪惡感（反向題）'},
    {k:'S1_Intent_Composite',l:'🔑 詐欺意圖複合指標（Q1+Q2+Q3 均值）'},
  ];
  let dRows='';
  [[gA,'A 一般聲明'],[gB,'B 誠實聲明'],[gC,'C 社會規範']].forEach(([g,l])=>{
    if(!g.length){dRows+=`<tr><td>${l}<td colspan="8" style="color:#aaa;text-align:center">無資料</tr>`;return;}
    const ms=['S1_Q1','S1_Q2','S1_Q3','S1_Q4','S1_Q5','S1_Q6_R','S1_Q7_R'].map(k=>mu(g.map(r=>num(r[k])).filter(v=>!isNaN(v))));
    const ci=mu(g.map(r=>num(r.S1_Intent_Composite)).filter(v=>!isNaN(v)));
    dRows+=`<tr><td><strong>${l}</strong> (n=${g.length})</td>${ms.map(m=>`<td>${isNaN(m)?'—':m.toFixed(2)}</td>`).join('')}<td><strong>${isNaN(ci)?'—':ci.toFixed(2)}</strong></td></tr>`;
  });
  let aRows='';
  vars.forEach(({k,l})=>{
    const gs=[gA,gB,gC].map(g=>g.map(r=>num(r[k])).filter(v=>!isNaN(v))).filter(g=>g.length>=2);
    if(gs.length<2){aRows+=`<tr><td>${l}<td colspan="9" style="color:#aaa;text-align:center">資料不足</tr>`;return;}
    const r=anova(gs);const sl=sigStar(r.p),sc=r.p<.05?'sig':'',hl=r.p<.05?'hl':'';
    aRows+=`<tr class="${hl}"><td style="font-size:11.5px;">${l}</td><td>${r.SSB.toFixed(2)}</td><td>${r.SSW.toFixed(2)}</td><td>${r.dfB}</td><td>${r.dfW}</td><td>${r.MSB.toFixed(3)}</td><td>${r.MSW.toFixed(3)}</td><td class="${sc}">${r.F.toFixed(3)}</td><td class="${sc}">${fp(r.p)}</td><td class="${sc}">${sl}</td></tr>`;
  });
  return`
<div class="alert alert-info">單因子變異數分析（One-Way ANOVA）｜核心假設：不同理賠申請書聲明文字（A 一般聲明 / B 誠實聲明 / C 社會規範）能否有效降低手機險浮報意圖</div>
<div class="sec-title" style="font-size:14px;">各組描述統計（平均值）</div>
<div style="overflow-x:auto;"><table class="dtbl"><thead><tr><th>條件</th><th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th><th>Q5</th><th>Q6反</th><th>Q7反</th><th>🔑意圖均值</th></tr></thead><tbody>${dRows}</tbody></table></div>
<div class="sec-title" style="font-size:14px;margin-top:6px;">ANOVA 分析結果</div>
<div style="overflow-x:auto;"><table class="atbl"><thead><tr><th>依變數</th><th>SS組間</th><th>SS組內</th><th>df組間</th><th>df組內</th><th>MS組間</th><th>MS組內</th><th>F 值</th><th>p 值</th><th>顯著</th></tr></thead><tbody>${aRows}</tbody></table></div>
<div class="legend">顯著性：*** p&lt;.001 ** p&lt;.01 * p&lt;.05 † p&lt;.10 ns 不顯著 ｜ 🟡 黃色列 p&lt;.05<br>
注意：Q6、Q7 為反向題，分數愈高表示道德感知愈弱。建議分析前刪除 S1_ManipCorrect=0 之樣本以提高內部效度。</div>`;}

/* ── PROCESS Model 4 TAB ── */
function tabProcess2(rs){
  const s2v=rs.filter(r=>r.S2_Condition&&r.S2_Q6_Guilt&&r.S2_Q7_Guilt&&r.S2_Q1&&r.S2_Q2&&r.S2_Q3);
  if(s2v.length<15)return`<div class="alert alert-warn">情境二有效資料不足（目前 ${s2v.length} 筆）。Bootstrap 拔靴法需至少 15 筆以上資料，建議收集 30 筆以上以獲得穩定估計。</div>`;
  const x=s2v.map(r=>+r.S2_CondCode);
  const m=s2v.map(r=>(+r.S2_Q6_Guilt+ +r.S2_Q7_Guilt)/2);
  const y=s2v.map(r=>(+r.S2_Q1+ +r.S2_Q2+ +r.S2_Q3)/3);
  const res=runMediation(x,m,y,5000);
  if(!res)return'<div class="alert alert-warn">分析失敗，請確認資料完整性。</div>';
  const nA=s2v.filter(r=>r.S2_Condition==='A').length;
  const nB=s2v.filter(r=>r.S2_Condition==='B').length;
  const mAg=mu(s2v.filter(r=>r.S2_Condition==='A').map(r=>(+r.S2_Q6_Guilt+ +r.S2_Q7_Guilt)/2));
  const mBg=mu(s2v.filter(r=>r.S2_Condition==='B').map(r=>(+r.S2_Q6_Guilt+ +r.S2_Q7_Guilt)/2));
  const mAi=mu(s2v.filter(r=>r.S2_Condition==='A').map(r=>(+r.S2_Q1+ +r.S2_Q2+ +r.S2_Q3)/3));
  const mBi=mu(s2v.filter(r=>r.S2_Condition==='B').map(r=>(+r.S2_Q1+ +r.S2_Q2+ +r.S2_Q3)/3));
  const sl=p=>p<.001?'***':p<.01?'**':p<.05?'*':p<.1?'†':'';
  const medOK=!(res.lo<=0&&res.hi>=0);
  const tr=(label,b,se,tv,pv,note='')=>`<tr class="${pv<.05?'hl':''}"><td>${label}${note?`<br><small style="color:#718096;">${note}</small>`:''}</td><td class="${pv<.05?'sig':''}">${b>=0?'+':''}${b.toFixed(4)}</td><td>${se.toFixed(4)}</td><td>${tv.toFixed(3)}</td><td class="${pv<.05?'sig':''}">${fp(pv)}</td><td class="${pv<.05?'sig':''}">${sl(pv)}</td></tr>`;
  return`
<div class="alert alert-info"><strong>Hayes PROCESS Macro Model 4（簡單中介效果分析）</strong><br>
  研究假設：互助資金池框架（B 組）→ 提升「預期罪惡感」（M）→ 降低車體險浮報意圖（Y）<br>
  X = 條件組別（A=0 大金控控制組 / B=1 互助框架實驗組）｜M = 預期罪惡感（Q6+Q7 均值）｜Y = 浮報意圖（Q1+Q2+Q3 均值）</div>
<div class="sec-title" style="font-size:14px;">各組描述統計</div>
<table class="dtbl" style="max-width:500px;">
  <thead><tr><th>組別</th><th>n</th><th>M 預期罪惡感</th><th>Y 浮報意圖</th></tr></thead>
  <tbody>
    <tr><td><strong>A（大金控形象，X=0）</strong></td><td>${nA}</td><td>${mAg.toFixed(2)}</td><td>${mAi.toFixed(2)}</td></tr>
    <tr><td><strong>B（互助資金池，X=1）</strong></td><td>${nB}</td><td>${mBg.toFixed(2)}</td><td>${mBi.toFixed(2)}</td></tr>
  </tbody>
</table>
<div class="proc-section">
  <h4>─── Model 1：M（預期罪惡感）← X（條件組別） ───</h4>
  <table class="atbl"><thead><tr><th>預測變數</th><th>b</th><th>SE</th><th>t</th><th>p</th><th>顯著</th></tr></thead>
  <tbody>${tr('X → M（路徑 a）',res.a,res.a_se,res.a_t,res.a_p,'B 組是否使罪惡感升高？')}</tbody></table>
  <p style="font-size:12px;color:#4a5568;">路徑 a = ${res.a.toFixed(4)}：B 組（互助框架）使預期罪惡感${res.a>0?'↑ 升高':'↓ 降低'} ${Math.abs(res.a).toFixed(4)} 單位</p>
</div>
<div class="proc-section">
  <h4>─── Model 2：Y（浮報意圖）← X + M（同時放入） ───</h4>
  <table class="atbl"><thead><tr><th>預測變數</th><th>b</th><th>SE</th><th>t</th><th>p</th><th>顯著</th></tr></thead>
  <tbody>
    ${tr('M → Y（路徑 b，控制 X 下）',res.b,res.b_se,res.b_t,res.b_p,'罪惡感能否降低浮報意圖？')}
    ${tr('X → Y（路徑 c\'，直接效果）',res.cp,res.cp_se,res.cp_t,res.cp_p,'控制 M 後 X 的直接影響')}
  </tbody></table>
  <p style="font-size:12px;color:#4a5568;">路徑 b = ${res.b.toFixed(4)}：罪惡感每增加 1 單位，浮報意圖${res.b<0?'↓ 降低':'↑ 升高'} ${Math.abs(res.b).toFixed(4)} 單位（控制 X 後）</p>
</div>
<div class="proc-section">
  <h4>─── 效果分解（Effect Decomposition） ───</h4>
  <table class="atbl"><thead><tr><th>效果</th><th>b</th><th>SE</th><th>t</th><th>p</th><th>說明</th></tr></thead>
  <tbody>
    ${tr('總效果 c（X→Y）',res.c,res.c_se,res.c_t,res.c_p,'含中介路徑的 X 對 Y 總影響')}
    ${tr('直接效果 c\'（X→Y|M）',res.cp,res.cp_se,res.cp_t,res.cp_p,'排除中介後 X 對 Y 的剩餘影響')}
    <tr style="background:#eff6ff;"><td><strong>間接效果 a×b（X→M→Y）</strong></td><td><strong>${(res.indirect>=0?'+':'')+res.indirect.toFixed(4)}</strong></td><td colspan="4" style="font-size:12px;color:#4a5568;">以 Bootstrap 95% CI 檢定（見下方），a×b = ${res.a.toFixed(4)} × ${res.b.toFixed(4)}</td></tr>
  </tbody></table>
</div>
<div class="indir-box ${medOK?'indir-ok':'indir-ns'}">
  <h4>${medOK?'✅':'⚠️'} Bootstrap 拔靴法 95% 信賴區間（間接效果檢定）</h4>
  <p>間接效果估計值（a×b）：<strong>${(res.indirect>=0?'+':'')+res.indirect.toFixed(4)}</strong></p>
  <p style="margin-top:5px;">Bootstrap 95% CI（B = ${res.B} 次，Percentile Method）：<strong>[${res.lo.toFixed(4)}, ${res.hi.toFixed(4)}]</strong></p>
  <p style="margin-top:10px;font-weight:700;font-size:13.5px;">${medOK
    ?`✅ CI 不包含 0 → 中介效果達統計顯著（等同 p &lt; .05）。${res.cp_p>=.05?'直接效果 c\' 不顯著，支持<strong>完全中介（Full Mediation）</strong>。':'直接效果 c\' 亦顯著，支持<strong>部分中介（Partial Mediation）</strong>。'}互助資金池框架確實透過提升預期罪惡感，進而降低浮報意圖。`
    :`⚠️ CI 包含 0（[${res.lo.toFixed(4)}, ${res.hi.toFixed(4)}]）→ 中介效果在 α=.05 下未達顯著。建議增加樣本量或重新檢視中介變數之操弄強度。`}
  </p>
</div>
<div class="legend">† p&lt;.10 * p&lt;.05 ** p&lt;.01 *** p&lt;.001 ｜ 此輸出格式對應 SPSS PROCESS Macro Model 4（Hayes, 2013, 2022）<br>
SPSS 操作提示：匯出 CSV 後，在 SPSS 執行 PROCESS：X=S2_CondCode, M=S2_Guilt_Composite, Y=S2_Intent_Composite, Model=4, Bootstrap=5000</div>`;}

/* ── RAW DATA ── */
function tabRaw(rs){if(!rs.length)return'<div class="alert alert-warn">尚無資料。</div>';const cols=Object.keys(rs[0]);const disp=rs.slice(-30);return`${rs.length>30?`<div class="alert alert-info">顯示最後 30 筆（共 ${rs.length} 筆），完整資料請匯出 CSV。</div>`:''}
<div class="raw-wrap"><table class="rtbl"><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${disp.map(r=>`<tr>${cols.map(c=>`<td>${r[c]??''}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;}

/* ════════════════════════════════════
   CSV EXPORT
   ════════════════════════════════════ */
function exportCSV(){storageLoadAll().then(rs=>{if(!rs.length){alert('目前沒有資料可以匯出。');return;}const cols=Object.keys(rs[0]);let csv='\uFEFF'+cols.join(',')+'\n';rs.forEach(r=>{csv+=cols.map(c=>`"${String(r[c]??'').replace(/"/g,'""')}"`).join(',')+'\n';});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download=`survey_data_${new Date().toISOString().slice(0,10)}.csv`;a.click();});}

/* ════════════════════════════════════
   UI HELPERS
   ════════════════════════════════════ */
function qB(n,text,input){return`<div class="q-block"><div class="q-text"><span class="q-num">${n}</span><span>${text}</span></div>${input}</div>`;}
function rg(key,opts){return`<div class="radio-group">${opts.map(([v,l])=>ro(key,v,l)).join('')}</div>`;}
function ro(key,val,label){return`<label class="radio-opt${S[key]===val?' sel':''}" data-key="${key}" data-val="${val}"><input type="radio" name="${key}" value="${val}"${S[key]===val?' checked':''}><span>${label}</span></label>`;}
function likert(prefix,qs){const ans=S[prefix];const rows=qs.map((q,i)=>{const qi='q'+(i+1);return`<tr><td>${i+1}. ${q}</td>${[1,2,3,4,5].map(v=>`<td><input type="radio" name="${prefix}_${qi}" value="${v}"${ans[qi]===v?' checked':''} data-prefix="${prefix}" data-qi="${qi}" data-v="${v}"></td>`).join('')}</tr>`;}).join('');return`<div class="likert-wrap"><table class="likert-tbl"><thead><tr><th>題目</th><th>1<br><small>非常不同意</small></th><th>2</th><th>3<br><small>普通</small></th><th>4</th><th>5<br><small>非常同意</small></th></tr></thead><tbody>${rows}</tbody></table></div><div class="likert-hint"><span>← 非常不同意 / 極不可能</span><span>非常同意 / 極有可能 →</span></div>`;}
function bindClicks(){
  document.querySelectorAll('.radio-opt').forEach(el=>{
    el.addEventListener('click',function(e){if(e.target.tagName==='INPUT')return;const key=this.dataset.key,val=this.dataset.val;if(!key)return;S[key]=val;document.querySelectorAll(`.radio-opt[data-key="${key}"]`).forEach(l=>l.classList.remove('sel'));this.classList.add('sel');const inp=this.querySelector('input');if(inp)inp.checked=true;});
    el.querySelector('input')?.addEventListener('change',function(){const key=this.closest('.radio-opt').dataset.key,val=this.value;if(!key)return;S[key]=val;document.querySelectorAll(`.radio-opt[data-key="${key}"]`).forEach(l=>l.classList.remove('sel'));this.closest('.radio-opt').classList.add('sel');});
  });
  document.querySelectorAll('input[data-prefix]').forEach(inp=>{inp.addEventListener('change',function(){S[this.dataset.prefix][this.dataset.qi]=+this.dataset.v;});});
}
/* INIT */
render();
</script>
</body>
</html>
